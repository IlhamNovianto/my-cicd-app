name: Flutter CI/CD

on:
    push:
        branches: [main]
        tags:
            - "v*" # ← trigger saat push tag v1.0.0, v1.2.3, dst
    pull_request:
        branches: [main]

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    ci_analyze_test:
        name: Analyze and Test
        runs-on: ubuntu-latest

        steps:
            - name: Checkout kode
              uses: actions/checkout@v4.2.2

            - name: Setup Flutter
              uses: subosito/flutter-action@v2
              with:
                  flutter-version: "3.41.4"
                  channel: "stable"

            - name: Install dependencies
              run: flutter pub get

            - name: Flutter Analyze
              run: flutter analyze

            - name: Flutter Test
              run: flutter test

    cd_build_apk:
        name: Build APK
        runs-on: ubuntu-latest
        needs: ci_analyze_test

        steps:
            - name: Checkout kode
              uses: actions/checkout@v4.2.2

            - name: Setup Flutter
              uses: subosito/flutter-action@v2
              with:
                  flutter-version: "3.41.4"
                  channel: "stable"

            - name: Install dependencies
              run: flutter pub get

            - name: Build APK
              run: flutter build apk --release

            # Simpan APK sebagai artifact (seperti sebelumnya)
            - name: Upload APK Artifact
              uses: actions/upload-artifact@v4
              with:
                  name: release-apk
                  path: build/app/outputs/flutter-apk/app-release.apk
                  retention-days: 7

            # Otomatis buat GitHub Release saat push tag v*
            - name: Create GitHub Release
              if: startsWith(github.ref, 'refs/tags/v')
              uses: softprops/action-gh-release@v2
              with:
                  files: build/app/outputs/flutter-apk/app-release.apk
                  generate_release_notes: true
